kind = "web"
previewPath = "/"
title = "Universe Account System"
version = "1.0.0"
id = "artifacts/universe-account"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20301

[services.development]
run = "pnpm --filter @workspace/universe-account run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/universe-account", "run", "build" ]
publicDir = "artifacts/universe-account/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20301"
BASE_PATH = "/"
